<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Ajax Website</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#d2122e;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:30px;
text-align:center;
}

button{
background:#d2122e;
color:white;
border:none;
padding:15px 25px;
margin:10px;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:black;
}

footer{
background:black;
color:white;
text-align:center;
padding:10px;
position:fixed;
bottom:0;
width:100%;
}
</style>
</head>

<body>

<header>
<h1>Welkom bij de Ajax Fanpagina</h1>
<p>Website over 
:contentReference[oaicite:1]{index=1}
uit 
:contentReference[oaicite:2]{index=2}
</p>
</header>

<div class="container">

<h2>Kies een pagina</h2>

<a href="spelers.html">
<button>Ajax Spelers</button>
</a>

<a href="prijzen.html">
<button>Ajax Prijzen</button>
</a>

</div>

<footer>
<p>Ajax Fan Website</p>
</footer>

</body>
</html>
